# Render Blueprint (Infrastructure-as-Code) for the backend.
# Creates the API, the Celery worker (+ Beat), a Redis instance, and a
# Postgres database. The frontend deploys separately to Vercel (see DEPLOY.md).
#
# Set the secret env vars (SUPABASE_*, GROQ_API_KEY, TOKEN_ENCRYPTION_KEY,
# SLACK_WEBHOOK_URL) in the Render dashboard after the first deploy.
services:
  - type: web
    name: triage-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    startCommand: uvicorn triage.api.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: triage-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: triage-redis
          type: keyvalue
          property: connectionString
      - key: APP_ENV
        value: production
      - { key: SUPABASE_URL, sync: false }
      - { key: SUPABASE_ANON_KEY, sync: false }
      - { key: SUPABASE_JWT_SECRET, sync: false }
      - { key: GROQ_API_KEY, sync: false }
      - { key: TOKEN_ENCRYPTION_KEY, sync: false }
      - { key: SLACK_WEBHOOK_URL, sync: false }
      - { key: FRONTEND_ORIGIN, sync: false }

  - type: worker
    name: triage-worker
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    startCommand: celery -A triage.worker.celery_app.celery worker -B -s /tmp/celerybeat-schedule --loglevel=INFO --concurrency=2
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: triage-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: triage-redis
          type: keyvalue
          property: connectionString
      - { key: SUPABASE_URL, sync: false }
      - { key: SUPABASE_JWT_SECRET, sync: false }
      - { key: GROQ_API_KEY, sync: false }
      - { key: TOKEN_ENCRYPTION_KEY, sync: false }
      - { key: SLACK_WEBHOOK_URL, sync: false }

  - type: keyvalue
    name: triage-redis
    plan: free
    ipAllowList: []

databases:
  - name: triage-db
    plan: free
    postgresMajorVersion: "16"
