# Netlify config for the Next.js frontend (monorepo — app lives in web/).
# Netlify auto-installs @netlify/plugin-nextjs when it detects Next.js, which
# handles SSR, the App Router, and middleware.
[build]
  base = "web"
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"
